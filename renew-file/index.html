<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这是啥组 - Home</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1f308;</text></svg>">
    <link rel="stylesheet" href="style-new.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">这是啥组</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="team.html">Team Members</a></li>
                <li><a href="homework.html">Daily Homework</a></li>
                <li><a href="final-work.html">Final Work</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <!-- Hero 区域 -->
            <div class="hero fade-in">
                <h1>这是啥组</h1>
                <p>浙江万里学院 &middot; 艺术与科技专业</p>
                <div class="hero-buttons">
                    <a href="team.html" class="btn btn-primary">查看团队成员</a>
                    <a href="final-work.html" class="btn btn-secondary">查看最终作品</a>
                </div>
            </div>

            <!-- 团队简介 -->
            <div class="page-title fade-in" style="animation-delay: 0.2s;">
                <h1>关于我们</h1>
                <p>我们是一个充满活力和创造力的团队，来自浙江万里学院艺术与科技专业</p>
            </div>

            <!-- 团队成员预览 -->
            <div class="team-grid">
                <div class="team-card fade-in" style="animation-delay: 0.3s;">
                    <img src="memoji.png" alt="王昱涵" class="team-avatar">
                    <h3 class="team-name">王昱涵</h3>
                    <p class="team-info">学号: 2024014747</p>
                </div>

                <div class="team-card fade-in" style="animation-delay: 0.4s;">
                    <img src="memoji (1).png" alt="陈过" class="team-avatar">
                    <h3 class="team-name">陈过</h3>
                    <p class="team-info">学号: 2024014742</p>
                </div>

                <div class="team-card fade-in" style="animation-delay: 0.5s;">
                    <img src="memoji (2).png" alt="蔡仪彤" class="team-avatar">
                    <h3 class="team-name">蔡仪彤</h3>
                    <p class="team-info">学号: 2024014735</p>
                </div>

                <div class="team-card fade-in" style="animation-delay: 0.6s;">
                    <img src="memoji (3).png" alt="蔡奥秘" class="team-avatar">
                    <h3 class="team-name">蔡奥秘</h3>
                    <p class="team-info">学号: 2024014745</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2024 这是啥组 &middot; 浙江万里学院 &middot; 艺术与科技专业</p>
    </footer>

    <script>
        // 添加导航栏滚动效果
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.15)';
            } else {
                navbar.style.boxShadow = '0 4px 12px rgba(0, 0, 0, 0.08)';
            }
        });
    </script>
</body>
</html>
