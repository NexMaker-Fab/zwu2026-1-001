<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management - 这是啥组</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">这是啥组</a>
            <ul class="nav-menu">
                <li><a href="index.html#home">首页</a></li>
                <li><a href="index.html#members">成员</a></li>
                <li><a href="index.html#works">作业</a></li>
                <li><a href="index.html#final">期末作品</a></li>
            </ul>
        </div>
    </nav>

    <section class="pm-hero">
        <div class="pm-content">
            <h1 class="pm-title">Project Management</h1>
            <p class="pm-subtitle">项目管理 · GitHub仓库创建指南</p>
            <div class="pm-line"></div>
        </div>
    </section>

    <section class="pm-section">
        <div class="pm-step">
            <div class="step-header">
                <span class="step-number">01</span>
                <h2 class="step-title">Create a repository</h2>
                <p class="step-desc">创建GitHub仓库的完整步骤</p>
            </div>
            
            <div class="step-images">
                <div class="image-card">
                    <img src="images/pm-step1.png" alt="创建新仓库入口" class="step-image">
                    <p class="image-caption">点击 New 按钮创建新仓库</p>
                </div>
                
                <div class="image-card">
                    <img src="images/pm-step2.png" alt="填写仓库信息" class="step-image">
                    <p class="image-caption">设置仓库名称和可见性</p>
                </div>
                
                <div class="image-card">
                    <img src="images/pm-step3.png" alt="配置选项" class="step-image">
                    <p class="image-caption">添加README并创建仓库</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-line"></div>
        <div class="footer-content">
            <p class="footer-text">&copy; 2026 这是啥组</p>
            <p class="footer-subtext">艺术与科技专业</p>
        </div>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
